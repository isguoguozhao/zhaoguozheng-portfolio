services:
  - type: web
    name: zhaoguozheng-portfolio-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: RAILWAY_ENVIRONMENT
        value: production
    healthCheckPath: /
